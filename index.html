<!doctype html>
<html>
<head>
  <link rel="icon" href="data:">
  <script type="module">
    import config from "https://gpickell.github.io/vertigis-markdown-viewer/src/viewer.js";

    const args = new URLSearchParams(window.location.search);
    const tag = (args.get("tag") || "gh-pages") + "/";
    const href = new URL("https://raw.githubusercontent.com/gpickell/studio-base/" + tag);

    await config({
      studio: "" + new URL("README.md", href),
      index: "" + new URL("docs/index.md", href),
      setup: "https://raw.githubusercontent.com/gpickell/vertigis-starter-kit/master/README.md",
      utils: "https://raw.githubusercontent.com/gpickell/vertigis-starter-kit/master/utils/README.md",
    });
  </script>
</head>
<body></body>
</html>
